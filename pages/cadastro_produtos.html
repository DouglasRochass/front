<!DOCTYPE html>
<html lang="pt-br" data-api-url="https://smart-ckv7.onrender.com/api">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base-url" content="https://smart-ckv7.onrender.com/api">
    <title>Cadastro de produtos - SmartEstok</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script>
      // Verificação SÍNCRONA antes de renderizar
      (function() {
        const token = localStorage.getItem('access_token');
        if (!token || token.trim() === '') {
          window.location.replace('/login');
        }
      })();
    </script>
  </head>
  
  <body>
    <nav id="navbar"></nav>
    
    <main>
      <section>
        <h1>Cadastro de produtos</h1>
        
        <form id="formCadastroProduto" novalidate>
          
          <fieldset>
            <legend>Dados do produto</legend>
            
            <div class="form-group">
              <label for="nome_produto">Nome do produto *</label>
              <input 
                type="text" 
                id="nome_produto" 
                name="nome"
                placeholder="Digite o nome do produto" 
                required
                aria-required="true"
                aria-label="Nome do produto">
            </div>
            
            <div class="form-group">
              <label for="descricao">Descrição *</label>
              <textarea 
                id="descricao" 
                name="descricao"
                placeholder="Descreva o produto" 
                rows="3" 
                required
                aria-required="true"
                aria-label="Descrição do produto"></textarea>
            </div>
            
            <div class="form-group">
              <label for="categoria">Categoria *</label>
              <input 
                type="text" 
                id="categoria" 
                name="categoria"
                placeholder="Ex: Alimentos, Bebidas" 
                required
                aria-required="true"
                aria-label="Categoria do produto">
            </div>
          </fieldset>
          
          <fieldset>
            <legend>Fornecedor</legend>
            
            <div class="form-group">
              <label for="fornecedorId">Fornecedor *</label>
              <select 
                id="fornecedorId" 
                name="fornecedorId"
                required
                aria-required="true"
                aria-label="Selecione um fornecedor"
                data-loading="true">
                <option value="">Carregando fornecedores...</option>
              </select>
              <small id="fornecedorHelp" class="form-help">Carregando fornecedores...</small>
            </div>
          </fieldset>
          
          <fieldset>
            <legend>Estoque e Preço</legend>
            
            <div class="form-group">
              <label for="quantidade">Quantidade *</label>
              <input 
                type="number" 
                id="quantidade" 
                name="quantidade"
                placeholder="Ex: 10" 
                min="0" 
                required
                aria-required="true"
                aria-label="Quantidade em estoque">
            </div>
            
            <div class="form-group">
              <label for="preco">Preço (R$) *</label>
              <input 
                type="text" 
                id="preco" 
                name="preco"
                placeholder="Ex: 25.50 ou 25,50" 
                required
                aria-required="true"
                aria-label="Preço do produto">
              <small class="form-help">Use ponto ou vírgula como separador decimal</small>
            </div>
          </fieldset>

          <div class="form-actions">
            <button 
              type="submit" 
              id="btnSalvar"
              aria-label="Salvar novo produto">
              Salvar
            </button>
            <button 
              type="button" 
              id="btnCancelar"
              aria-label="Cancelar cadastro">
              Cancelar
            </button>
          </div>
          
        </form>
        
      </section>
    </main>

    <script type="module">
      import Navbar from '../js/components/Navbar.js';
      import AuthService from '../js/services/AuthService.js';
      import ProdutoService from '../js/services/ProdutoService.js';
      import FornecedorService from '../js/services/FornecedorService.js';
      import Toast from '../js/components/Toast.js';


      new Navbar().render();

      const form = document.getElementById('formCadastroProduto');
      const fornecedorSelect = document.getElementById('fornecedorId');
      const btnSalvar = document.getElementById('btnSalvar');
      const btnCancelar = document.getElementById('btnCancelar');

      // Carregar fornecedores
      async function carregarFornecedores() {
        try {
          console.log('[CadastroProdutos] Carregando fornecedores...');
          const result = await FornecedorService.listar();
          
          if (result.success && result.data) {
            console.log('[CadastroProdutos] Fornecedores carregados:', result.data);
            
            fornecedorSelect.innerHTML = '<option value="">Selecione um fornecedor...</option>';
            
            result.data.forEach(fornecedor => {
              const option = document.createElement('option');
              option.value = fornecedor.id;
              option.textContent = fornecedor.nome;
              fornecedorSelect.appendChild(option);
            });
            
            fornecedorSelect.removeAttribute('data-loading');
            document.getElementById('fornecedorHelp').textContent = `${result.data.length} fornecedor(es) disponível(is)`;
          } else {
            console.error('[CadastroProdutos] Erro ao carregar fornecedores:', result.message);
            Toast.error('Erro ao carregar fornecedores');
            fornecedorSelect.innerHTML = '<option value="">Erro ao carregar fornecedores</option>';
          }
        } catch (error) {
          console.error('[CadastroProdutos] Erro:', error);
          Toast.error('Erro ao carregar fornecedores');
        }
      }

      // Função para converter preço (aceita vírgula ou ponto)
      function parsePreco(valor) {
        if (!valor) return null;
        // Remove espaços e substitui vírgula por ponto
        const valorLimpo = valor.toString().trim().replace(',', '.');
        const numero = parseFloat(valorLimpo);
        return isNaN(numero) ? null : numero;
      }

      // Salvar produto
      async function salvarProduto(e) {
        e.preventDefault();
        
        try {
          // Validar formulário HTML5
          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }

          btnSalvar.disabled = true;
          btnSalvar.textContent = 'Salvando...';

          // Coletar e validar dados
          const nome = document.getElementById('nome_produto').value.trim();
          const descricao = document.getElementById('descricao').value.trim();
          const categoria = document.getElementById('categoria').value.trim();
          const fornecedorId = parseInt(document.getElementById('fornecedorId').value);
          const quantidade = parseInt(document.getElementById('quantidade').value);
          const precoInput = document.getElementById('preco').value;
          const preco = parsePreco(precoInput);

          // Validações adicionais
          if (!nome) {
            Toast.error('Nome do produto é obrigatório');
            return;
          }

          if (!descricao) {
            Toast.error('Descrição é obrigatória');
            return;
          }

          if (!categoria) {
            Toast.error('Categoria é obrigatória');
            return;
          }

          if (!fornecedorId || fornecedorId <= 0) {
            Toast.error('Selecione um fornecedor válido');
            return;
          }

          if (isNaN(quantidade) || quantidade < 0) {
            Toast.error('Quantidade deve ser um número maior ou igual a zero');
            return;
          }

          if (preco === null || preco <= 0) {
            Toast.error('Preço deve ser um número maior que zero. Use ponto ou vírgula como separador decimal.');
            return;
          }

          const dados = {
            nome,
            descricao,
            categoria,
            fornecedorId,
            quantidade,
            preco
          };

          console.log('[CadastroProdutos] Enviando dados:', dados);

          const result = await ProdutoService.criar(dados);

          if (result.success) {
            Toast.success(result.message || 'Produto criado com sucesso!');
            form.reset();
            
            // Redirecionar para lista de produtos após 2 segundos
            setTimeout(() => {
              window.location.href = '/pages/produtos.html';
            }, 2000);
          } else {
            Toast.error(result.message || 'Erro ao criar produto');
            console.error('[CadastroProdutos] Erro:', result);
          }
        } catch (error) {
          console.error('[CadastroProdutos] Erro ao salvar:', error);
          Toast.error('Erro ao salvar produto: ' + (error.message || 'Erro desconhecido'));
        } finally {
          btnSalvar.disabled = false;
          btnSalvar.textContent = 'Salvar';
        }
      }

      // Cancelar
      function cancelarCadastro() {
        if (confirm('Deseja cancelar o cadastro?')) {
          window.location.href = '/pages/produtos.html';
        }
      }

      // Event listeners
      form.addEventListener('submit', salvarProduto);
      btnCancelar.addEventListener('click', cancelarCadastro);

      // Carregar fornecedores ao iniciar
      carregarFornecedores();
    </script>
  </body>
  
</html>
