c<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Redefinir senha</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
    // Se já está autenticado, redirecionar para dashboard
    if (localStorage.getItem('access_token')) {
      window.location.href = '/pages/dashboard.html';
    }
  </script>
  <style>
    .mensagem-aviso { animation: slideIn 0.3s ease-in-out; }
    @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(400px); opacity: 0; } }
    .senha-forte { color: #155724; font-size: 0.8rem; margin-top: 4px; display: none; }
    .senha-fraca { color: #721c24; font-size: 0.8rem; margin-top: 4px; display: none; }
  </style>
</head>

<body class="auth-page">

  <div class="login-wrapper">

    <img src="../logo.png" class="logo">

    <div class="login-container">

      <h1>Redefinir senha</h1>

      <p>Digite sua nova senha</p>

      <form id="form-redefinir">

        <label for="nova_senha">Nova senha</label>
        <div class="input-group">
          <span class="fa-solid fa-lock"></span>
          <input type="password" id="nova_senha" placeholder="Digite a nova senha" required>
        </div>
        <div class="senha-forte" id="senha-forte">✓ Senha forte</div>
        <div class="senha-fraca" id="senha-fraca">✗ Senha fraca (mín. 8 caracteres, maiúscula, número)</div>

        <label for="confirmar_senha">Confirmar senha</label>
        <div class="input-group">
          <span class="fa-solid fa-lock"></span>
          <input type="password" id="confirmar_senha" placeholder="Confirme a nova senha" required>
        </div>

        <button type="submit">Redefinir senha</button>

        <a href="./tela_login.html">Voltar para login</a>

      </form>

    </div>

  </div>

  <script>
    const API_CONFIG = {
      BASE_URL: 'https://smart-ckv7.onrender.com/api',
      ENDPOINTS: { REDEFINIR_SENHA: '/redefinir-senha' },
      HEADERS: { 'Content-Type': 'application/json', 'Accept': 'application/json' }
    };

    class APIService {
      async requisicao(endpoint, opcoes = {}) {
        const url = API_CONFIG.BASE_URL + endpoint;
        try {
          const response = await fetch(url, { headers: API_CONFIG.HEADERS, ...opcoes });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) return { sucesso: false, codigo: response.status, mensagem: data.message || `Erro HTTP ${response.status}` };
          return { sucesso: true, ...data };
        } catch (erro) {
          return { sucesso: false, mensagem: erro.message, codigo: 0 };
        }
      }

      async redefinirSenha(token, novaSenha, confirmaSenha) {
        return this.requisicao(API_CONFIG.ENDPOINTS.REDEFINIR_SENHA, {
          method: 'POST',
          body: JSON.stringify({ token, novaSenha, confirmaSenha })
        });
      }
    }

    const apiService = new APIService();

    function senhaForte(senha) {
      return senha.length >= 8 && /[A-Z]/.test(senha) && /[0-9]/.test(senha);
    }

    document.getElementById('nova_senha').addEventListener('input', function() {
      const forte = document.getElementById('senha-forte');
      const fraca = document.getElementById('senha-fraca');
      if (this.value.length === 0) { forte.style.display = 'none'; fraca.style.display = 'none'; return; }
      if (senhaForte(this.value)) { forte.style.display = 'block'; fraca.style.display = 'none'; }
      else { forte.style.display = 'none'; fraca.style.display = 'block'; }
    });

    document.addEventListener('DOMContentLoaded', function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        exibirMensagem('Token inválido ou expirado. Solicite uma nova recuperação.', 'erro');
        setTimeout(() => window.location.href = './recuperar_login.html', 3000);
        return;
      }

      const form = document.getElementById('form-redefinir');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const novaSenha = document.getElementById('nova_senha').value;
        const confirmaSenha = document.getElementById('confirmar_senha').value;

        if (!senhaForte(novaSenha)) { exibirMensagem('Senha fraca. Use ao menos 8 caracteres, uma maiúscula e um número.', 'erro'); return; }
        if (novaSenha !== confirmaSenha) { exibirMensagem('As senhas não coincidem.', 'erro'); return; }

        const botao = form.querySelector('button[type="submit"]');
        botao.disabled = true;
        botao.textContent = 'Redefinindo...';

        const resposta = await apiService.redefinirSenha(token, novaSenha, confirmaSenha);

        if (!resposta.sucesso) {
          exibirMensagem(resposta.mensagem || 'Erro ao redefinir senha', 'erro');
          botao.disabled = false;
          botao.textContent = 'Redefinir senha';
          return;
        }

        exibirMensagem('Senha redefinida com sucesso!', 'sucesso');
        setTimeout(() => window.location.href = './senha_atualizada.html', 2000);
      });
    });

    function exibirMensagem(mensagem, tipo = 'info') {
      const anterior = document.querySelector('.mensagem-aviso');
      if (anterior) anterior.remove();
      const div = document.createElement('div');
      div.className = `mensagem-aviso mensagem-${tipo}`;
      div.textContent = mensagem;
      div.style.cssText = `
        position: fixed; top: 20px; right: 20px; padding: 15px 20px;
        border-radius: 4px; font-weight: 500; z-index: 1000; animation: slideIn 0.3s ease-in-out;
        ${tipo === 'erro' ? 'background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;' : ''}
        ${tipo === 'sucesso' ? 'background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;' : ''}
        ${tipo === 'info' ? 'background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb;' : ''}
      `;
      document.body.appendChild(div);
      setTimeout(() => { div.style.animation = 'slideOut 0.3s ease-in-out'; setTimeout(() => div.remove(), 300); }, 5000);
    }
  </script>
</body>
</html>
