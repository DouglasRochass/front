<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste API Services</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .test-section {
      margin-bottom: 40px;
    }

    .test-section h2 {
      color: #667eea;
      font-size: 18px;
      margin-bottom: 15px;
    }

    .test-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }

    .test-item strong {
      color: #333;
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button:hover {
      background: #764ba2;
    }

    .output {
      background: #f1f3f5;
      border: 1px solid #dee2e6;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: #333;
      line-height: 1.5;
    }

    .success {
      border-color: #28a745;
      background: #d4edda;
      color: #155724;
    }

    .error {
      border-color: #dc3545;
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      border-color: #ffc107;
      background: #fff3cd;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Teste de Serviços de API</h1>

    <div class="test-section">
      <h2>1. Verificar Imports de Módulos</h2>
      <button onclick="testarImports()">🔍 Testar Imports</button>
      <div id="imports-output" class="output" style="display: none;"></div>
    </div>

    <div class="test-section">
      <h2>2. Testar APIService</h2>
      <button onclick="testarAPIService()">📡 Testar APIService</button>
      <div id="apiservice-output" class="output" style="display: none;"></div>
    </div>

    <div class="test-section">
      <h2>3. Testar Conexão com Backend</h2>
      <button onclick="testarConexao()">🌐 Testar Conexão</button>
      <div id="conexao-output" class="output" style="display: none;"></div>
    </div>

    <div class="test-section">
      <h2>4. Testar GET /produtos</h2>
      <button onclick="testarGET()">📥 Testar GET</button>
      <div id="get-output" class="output" style="display: none;"></div>
    </div>

    <div class="test-section">
      <h2>5. Verificar LocalStorage</h2>
      <button onclick="testarLocalStorage()">💾 Ver LocalStorage</button>
      <div id="storage-output" class="output" style="display: none;"></div>
    </div>

    <div class="test-section">
      <h2>6. Verificar Console de Erros</h2>
      <p>Abra DevTools (F12) e vá para a aba Console para ver erros detalhados</p>
      <button onclick="testarConsole()">📋 Teste Completo</button>
      <div id="console-output" class="output" style="display: none;"></div>
    </div>
  </div>

  <script type="module">
    function mostrarOutput(elementId, conteudo, status = 'loading') {
      const element = document.getElementById(elementId);
      element.textContent = typeof conteudo === 'string' ? conteudo : JSON.stringify(conteudo, null, 2);
      element.className = `output ${status}`;
      element.style.display = 'block';
      setTimeout(() => element.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }

    window.testarImports = async function() {
      mostrarOutput('imports-output', '⏳ Verificando imports...', 'loading');
      
      try {
        const imports = await import('../js/services/APIService.js');
        mostrarOutput('imports-output', `✓ APIService importado com sucesso\n${JSON.stringify(Object.keys(imports), null, 2)}`, 'success');
      } catch (error) {
        mostrarOutput('imports-output', `✗ Erro ao importar: ${error.message}`, 'error');
      }
    };

    window.testarAPIService = async function() {
      mostrarOutput('apiservice-output', '⏳ Testando APIService...', 'loading');
      
      try {
        const { default: APIService } = await import('../js/services/APIService.js');
        
        let output = 'APIService carregado com sucesso!\n\n';
        output += `Tipo de APIService: ${typeof APIService}\n`;
        output += `Métodos disponíveis:\n`;
        output += `  - get: ${typeof APIService.get}\n`;
        output += `  - post: ${typeof APIService.post}\n`;
        output += `  - put: ${typeof APIService.put}\n`;
        output += `  - delete: ${typeof APIService.delete}\n`;
        output += `  - request: ${typeof APIService.request}\n`;
        output += `Token: ${APIService.token ? '✓ Presente' : '✗ Ausente'}\n`;
        
        mostrarOutput('apiservice-output', output, 'success');
      } catch (error) {
        mostrarOutput('apiservice-output', `✗ Erro: ${error.message}\n\n${error.stack}`, 'error');
      }
    };

    window.testarConexao = async function() {
      mostrarOutput('conexao-output', '⏳ Testando conexão...', 'loading');
      
      try {
        const response = await fetch('http://localhost:8080/api/health');
        const data = await response.json().catch(() => ({}));
        
        mostrarOutput('conexao-output', `✓ Conexão OK\nStatus: ${response.status}\nResposta: ${JSON.stringify(data, null, 2)}`, 'success');
      } catch (error) {
        mostrarOutput('conexao-output', `✗ Erro de conexão: ${error.message}`, 'error');
      }
    };

    window.testarGET = async function() {
      mostrarOutput('get-output', '⏳ Testando GET...', 'loading');
      
      try {
        const { default: ProdutoService } = await import('../js/services/ProdutoService.js');
        const resultado = await ProdutoService.listar();
        
        mostrarOutput('get-output', `Resultado:\n${JSON.stringify(resultado, null, 2)}`, resultado.success ? 'success' : 'error');
      } catch (error) {
        mostrarOutput('get-output', `✗ Erro: ${error.message}\n\n${error.stack}`, 'error');
      }
    };

    window.testarLocalStorage = function() {
      const storage = {
        access_token: localStorage.getItem('access_token'),
        refresh_token: localStorage.getItem('refresh_token'),
        user: localStorage.getItem('user'),
        items: Object.keys(localStorage).length
      };
      
      mostrarOutput('storage-output', `LocalStorage:\n${JSON.stringify(storage, null, 2)}`, 'success');
    };

    window.testarConsole = async function() {
      mostrarOutput('console-output', '⏳ Realizando teste completo...', 'loading');
      
      try {
        const { default: APIService } = await import('../js/services/APIService.js');
        let output = 'Teste Completo\n\n';
        
        output += '1. APIService:\n';
        output += `   - Tipo: ${typeof APIService}\n`;
        output += `   - get: ${typeof APIService.get}\n`;
        output += `   - post: ${typeof APIService.post}\n\n`;
        
        output += '2. LocalStorage:\n';
        output += `   - access_token: ${localStorage.getItem('access_token') ? 'Sim' : 'Não'}\n\n`;
        
        output += '3. Teste de requisição:\n';
        try {
          const resultado = await APIService.get('/produtos');
          output += `   - Status: OK\n`;
          output += `   - Dados: ${typeof resultado}\n`;
        } catch (e) {
          output += `   - Status: Erro\n`;
          output += `   - Erro: ${e.message}\n`;
        }
        
        mostrarOutput('console-output', output, 'success');
      } catch (error) {
        mostrarOutput('console-output', `✗ Erro: ${error.message}`, 'error');
      }
    };
  </script>
</body>
</html>
