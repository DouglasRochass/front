<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - SmartStock</title>
  <link rel="stylesheet" href="../styles/main.css">
  <script>
    // Verificação SÍNCRONA antes de renderizar
    (function() {
      const token = localStorage.getItem('access_token');
      if (!token || token.trim() === '') {
        window.location.replace('/pages/tela_login.html');
      }
    })();
  </script>
  <style>
    .page-container { padding: var(--spacing-lg); max-width: 1400px; margin: 0 auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-xl); }
    .page-header h1 { font-size: 1.875rem; }
    .page-actions { display: flex; gap: var(--spacing-md); }
    .table-wrapper { background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); overflow: hidden; }
  </style>
</head>
<body>
  <nav id="navbar"></nav>

  <div class="page-container">
    <div class="page-header">
      <div>
        <h1>Produtos</h1>
        <p class="text-muted">Gerenciar catálogo de produtos</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="novo-produto-btn">+ Novo Produto</button>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="produtos-table"></div>
    </div>
  </div>

  <script type="module">
    import Navbar from '../js/components/Navbar.js';
    import AuthService from '../js/services/AuthService.js';
    import ProdutoService from '../js/services/ProdutoService.js';
    import FornecedorService from '../js/services/FornecedorService.js';
    import DataTable from '../js/components/DataTable.js';
    import Modal from '../js/components/Modal.js';
    import FormBuilder from '../js/components/FormBuilder.js';
    import Toast from '../js/components/Toast.js';

    const isGestor = AuthService.isGestor();

    const navbar = new Navbar();
    navbar.render();

    let table = null;
    let fornecedoresMap = {};

    // Carregar fornecedores para mapear IDs para nomes
    async function carregarFornecedores() {
      try {
        const result = await FornecedorService.listar();
        if (result.success && result.data) {
          result.data.forEach(f => {
            fornecedoresMap[f.id] = f.nome;
          });
          console.log('[Produtos] Fornecedores carregados:', fornecedoresMap);
        }
      } catch (error) {
        console.error('[Produtos] Erro ao carregar fornecedores:', error);
      }
    }

    async function loadProdutos() {
      // Carregar fornecedores primeiro
      await carregarFornecedores();
      
      const result = await ProdutoService.listar();

      if (result.success) {
        // Enriquecer dados dos produtos com nome do fornecedor
        const produtosEnriquecidos = (result.data || []).map(produto => ({
          ...produto,
          fornecedorNome: fornecedoresMap[produto.fornecedorId] || `ID: ${produto.fornecedorId}`,
          precoFormatado: `R$ ${parseFloat(produto.preco || 0).toFixed(2).replace('.', ',')}`
        }));

        console.log('[Produtos] Produtos enriquecidos:', produtosEnriquecidos);

        table = new DataTable({
          containerId: 'produtos-table',
          columns: [
            { label: 'Nome', field: 'nome' },
            { label: 'Preço', field: 'precoFormatado' },
            { label: 'Quantidade', field: 'quantidade' },
            { label: 'Fornecedor', field: 'fornecedorNome' },
            { label: 'Categoria', field: 'categoria' },
          ],
          data: produtosEnriquecidos,
          onEdit: isGestor ? editProduto : null,
          onDelete: isGestor ? deleteProduto : null,
          onView: viewProduto,
          pageSize: 10,
        });

        table.render();
        table.addActionListeners();
      } else {
        Toast.error('Erro ao carregar produtos');
      }
    }

    async function editProduto(id) {
      const result = await ProdutoService.obter(id);
      if (result.success) {
        // Redirecionar para página de edição ou abrir modal
        Toast.info('Edição de produto em desenvolvimento');
      } else {
        Toast.error('Erro ao carregar produto');
      }
    }

    async function deleteProduto(id) {
      if (confirm('Tem certeza que deseja deletar este produto?')) {
        const result = await ProdutoService.deletar(id);
        if (result.success) {
          Toast.success(result.message);
          loadProdutos();
        } else {
          Toast.error(result.message);
        }
      }
    }

    function viewProduto(id) {
      // Buscar o produto na lista
      const produto = table.data.find(p => p.id === id);
      if (produto) {
        const detalhes = `
          <div style="padding: 20px;">
            <h3>${produto.nome}</h3>
            <p><strong>Descrição:</strong> ${produto.descricao || 'N/A'}</p>
            <p><strong>Categoria:</strong> ${produto.categoria || 'N/A'}</p>
            <p><strong>Preço:</strong> ${produto.precoFormatado}</p>
            <p><strong>Quantidade:</strong> ${produto.quantidade}</p>
            <p><strong>Fornecedor:</strong> ${produto.fornecedorNome}</p>
          </div>
        `;
        
        const modal = new Modal({
          title: 'Detalhes do Produto',
          size: 'md',
        });
        modal.open();
        
        setTimeout(() => {
          const modalBody = modal.modal?.querySelector('.modal-body');
          if (modalBody) {
            modalBody.innerHTML = detalhes;
          }
        }, 100);
      }
    }

    const btnNovoProduto = document.getElementById('novo-produto-btn');
    if (btnNovoProduto) {
      btnNovoProduto.addEventListener('click', () => {
        if (!isGestor) {
          Toast.warning('Apenas gerentes podem criar produtos');
          return;
        }
        // Redirecionar para página de cadastro
        window.location.href = '/pages/cadastro_produtos.html';
      });
    }

    loadProdutos();
  </script>
</body>
</html>
