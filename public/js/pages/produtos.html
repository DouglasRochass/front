<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - SmartStock</title>
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    .page-container {
      padding: var(--spacing-lg);
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-xl);
    }

    .page-header h1 {
      font-size: 1.875rem;
    }

    .page-actions {
      display: flex;
      gap: var(--spacing-md);
    }

    .table-wrapper {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
    }

    .table-controls {
      padding: var(--spacing-lg);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
    }

    .search-input {
      flex: 1;
      max-width: 300px;
      padding: 0.625rem;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      font-size: 0.938rem;
    }

    .data-table-wrapper {
      overflow-x: auto;
    }

    .actions {
      white-space: nowrap;
    }

    .modal-wrapper {
      padding: var(--spacing-lg);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--spacing-md);
    }
  </style>
</head>
<body>
  <nav id="navbar"></nav>

  <div style="background: white; border-bottom: 1px solid #ddd; padding: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
    <a href="./dashboard.html" style="text-decoration: none; color: #6B7280; font-weight: 500;">Dashboard</a>
    <a href="./produtos.html" style="text-decoration: none; color: #3B82F6; font-weight: 600;">Produtos</a>
    <a href="./fornecedores.html" style="text-decoration: none; color: #6B7280; font-weight: 500;">Fornecedores</a>
    <a href="./funcionarios.html" style="text-decoration: none; color: #6B7280; font-weight: 500;">Funcionários</a>
    <a href="./mercados.html" style="text-decoration: none; color: #6B7280; font-weight: 500;">Mercados</a>
    <a href="./vendas.html" style="text-decoration: none; color: #6B7280; font-weight: 500;">Vendas</a>
    <a href="./cadastro_produtos.html" style="text-decoration: none; color: #6B7280; font-weight: 500; margin-left: auto;">Novo Produto</a>
    <a href="./tela_login.html" style="text-decoration: none; color: #EF4444; font-weight: 500;">Sair</a>
  </div>

  <div class="page-container">
    <div class="page-header">
      <div>
        <h1>Produtos</h1>
        <p class="text-muted">Gerenciar catálogo de produtos</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="novo-produto-btn">+ Novo Produto</button>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="produtos-table"></div>
    </div>
  </div>

  <script type="module">
    import Navbar from '../components/Navbar.js';
    import AuthService from '../services/AuthService.js';
    import ProdutoService from '../services/ProdutoService.js';
    import DataTable from '../components/DataTable.js';
    import Modal from '../components/Modal.js';
    import FormBuilder from '../components/FormBuilder.js';
    import Toast from '../components/Toast.js';

    // Verificar autenticação
    if (!AuthService.isAuthenticated()) {
      window.location.href = './tela_login.html';
    }

    // Verificar permissão (somente gerentes podem criar/editar)
    const isGestor = AuthService.isGestor();

    // Renderizar navbar
    const navbar = new Navbar();
    navbar.render();

    let table = null;

    async function loadProdutos() {
      const result = await ProdutoService.listar();
      
      if (result.success) {
        table = new DataTable({
          containerId: 'produtos-table',
          columns: [
            { label: 'Nome', field: 'nome' },
            { label: 'Preço', field: 'preco', format: (v) => `R$ ${parseFloat(v || 0).toFixed(2)}` },
            { label: 'Quantidade', field: 'quantidade' },
            { label: 'Fornecedor', field: 'fornecedor.nome' },
            { label: 'Mercado', field: 'mercado.nome' },
          ],
          data: result.data || [],
          onEdit: isGestor ? editProduto : null,
          onDelete: isGestor ? deleteProduto : null,
          onView: viewProduto,
          pageSize: 10,
        });

        table.render();
        table.addActionListeners();
      } else {
        Toast.error('Erro ao carregar produtos');
      }
    }

    async function editProduto(id) {
      const result = await ProdutoService.obter(id);
      if (result.success) {
        showFormModal('Editar Produto', result.data, true);
      } else {
        Toast.error('Erro ao carregar produto');
      }
    }

    async function deleteProduto(id) {
      if (confirm('Tem certeza que deseja deletar este produto?')) {
        const result = await ProdutoService.deletar(id);
        if (result.success) {
          Toast.success(result.message);
          loadProdutos();
        } else {
          Toast.error(result.message);
        }
      }
    }

    function viewProduto(id) {
      Toast.info(`Visualizando produto ${id}`);
    }

    function showFormModal(title, data = null, isEdit = false) {
      const form = new FormBuilder({
        formId: 'produto-form',
        title,
        fields: [
          { name: 'nome', label: 'Nome', type: 'text', required: true, value: data?.nome || '' },
          { name: 'descricao', label: 'Descrição', type: 'textarea', value: data?.descricao || '' },
          { name: 'preco', label: 'Preço', type: 'number', required: true, min: 0.01, value: data?.preco || '' },
          { name: 'quantidade', label: 'Quantidade', type: 'number', required: true, min: 0, value: data?.quantidade || '' },
          { name: 'codigoBarras', label: 'Código de Barras', type: 'text', value: data?.codigoBarras || '' },
          { name: 'sku', label: 'SKU', type: 'text', value: data?.sku || '' },
        ],
        submitText: isEdit ? 'Atualizar' : 'Criar',
        onSubmit: async (formData) => {
          try {
            let result;
            if (isEdit) {
              result = await ProdutoService.atualizar(data.id, formData);
            } else {
              result = await ProdutoService.criar(formData);
            }

            if (result.success) {
              Toast.success(result.message);
              modal.close();
              loadProdutos();
            } else {
              Toast.error(result.message);
            }
          } catch (error) {
            Toast.error('Erro ao salvar produto');
          }
        },
      });

      const modal = new Modal({
        title,
        size: 'lg',
        buttons: [
          { text: 'Cancelar', class: 'btn-secondary', onClick: () => modal.close() },
        ],
      });

      modal.open();

      setTimeout(() => {
        const modalBody = modal.modal?.querySelector('.modal-body');
        if (modalBody) {
          form.render(modalBody);
        } else {
          console.error('[showFormModal] Modal body não encontrado');
          Toast.error('Erro ao abrir formulário');
        }
      }, 100);
    }

    // Event listeners
    document.getElementById('novo-produto-btn').addEventListener('click', () => {
      if (!isGestor) {
        Toast.warning('Apenas gerentes podem criar produtos');
        return;
      }
      showFormModal('Novo Produto', null, false);
    });

    // Carregar produtos inicialmente
    loadProdutos();
  </script>
</body>
</html>
