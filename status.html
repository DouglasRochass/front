<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - SmartStock</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .status-item {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .status-ok {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .status-error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #dc3545;
    }

    .status-loading {
      background: #fff3cd;
      color: #856404;
      border-left: 4px solid #ffc107;
    }

    .icon {
      font-size: 20px;
      min-width: 24px;
      text-align: center;
    }

    .details {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 12px;
      line-height: 1.6;
      color: #666;
      font-family: monospace;
      max-height: 200px;
      overflow-y: auto;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #3B82F6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563EB;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #333;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .check-mark::before {
      content: '✓';
    }

    .x-mark::before {
      content: '✗';
    }

    .loading::before {
      content: '⏳';
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Status do SmartStock</h1>
    <p class="subtitle">Verificando a disponibilidade dos serviços...</p>

    <div id="status-container"></div>

    <div class="details">
      <div id="details-log">Aguardando testes...</div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="executarTestes()">🔄 Executar Testes</button>
      <button class="btn-secondary" onclick="irParaLogin()">📝 Ir para Login</button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8080/api';

    const testes = [
      {
        nome: 'Backend (API)',
        url: `${API_URL}/health`,
        descricao: 'Verifica se a API está rodando'
      },
      {
        nome: 'Frontend',
        url: '',
        descricao: 'Verifica se o frontend está acessível',
        custom: true
      },
    ];

    async function executarTestes() {
      const container = document.getElementById('status-container');
      const detailsLog = document.getElementById('details-log');
      
      container.innerHTML = '';
      let logs = 'Iniciando testes...\n';

      for (const teste of testes) {
        const item = document.createElement('div');
        item.className = 'status-item status-loading';
        item.innerHTML = `<div class="icon loading"></div><div>${teste.nome}</div>`;
        container.appendChild(item);

        try {
          let resultado = false;
          let mensagem = '';

          if (teste.custom) {
            // Teste do frontend
            resultado = true;
            mensagem = `Frontend OK - Você está na página de status`;
          } else {
            // Teste da API
            const response = await fetch(teste.url, {
              method: 'GET',
              headers: { 'Content-Type': 'application/json' }
            });
            resultado = response.ok || response.status === 404;
            mensagem = `Status: ${response.status} ${response.statusText}`;
          }

          item.className = resultado ? 'status-item status-ok' : 'status-item status-error';
          item.innerHTML = `
            <div class="icon ${resultado ? 'check-mark' : 'x-mark'}"></div>
            <div>
              <strong>${teste.nome}</strong><br>
              <small>${resultado ? 'Online' : 'Offline'}</small>
            </div>
          `;

          logs += `✓ ${teste.nome}: ${resultado ? 'OK' : 'ERRO'} - ${mensagem}\n`;
        } catch (error) {
          item.className = 'status-item status-error';
          item.innerHTML = `
            <div class="icon x-mark"></div>
            <div>
              <strong>${teste.nome}</strong><br>
              <small>Erro: ${error.message}</small>
            </div>
          `;
          logs += `✗ ${teste.nome}: ERRO - ${error.message}\n`;
        }
      }

      // Adicionar verificação do localStorage
      const token = localStorage.getItem('access_token');
      const user = localStorage.getItem('user');
      
      const storageItem = document.createElement('div');
      storageItem.className = `status-item ${token && user ? 'status-ok' : 'status-error'}`;
      storageItem.innerHTML = `
        <div class="icon ${token && user ? 'check-mark' : 'x-mark'}"></div>
        <div>
          <strong>Autenticação Local</strong><br>
          <small>${token && user ? 'Autenticado' : 'Não autenticado'}</small>
        </div>
      `;
      container.appendChild(storageItem);

      logs += `${token && user ? '✓' : '✗'} Autenticação Local: ${token && user ? 'OK' : 'Não autenticado'}\n`;

      detailsLog.textContent = logs;
      
      // Auto-scroll
      setTimeout(() => {
        detailsLog.scrollTop = detailsLog.scrollHeight;
      }, 100);
    }

    function irParaLogin() {
      window.location.href = '/pages/tela_login.html';
    }

    // Executar testes ao carregar
    document.addEventListener('DOMContentLoaded', executarTestes);
  </script>
</body>
</html>
